<!DOCTYPE html>
<html lang="te">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>108 Govinda Namalu</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: "Noto Sans Telugu", sans-serif;
  background: radial-gradient(circle at center, #2b0000, #000);
  color: white;
}

/* Header */
.header {
  text-align: center;
  padding: 12px;
  color: gold;
  font-weight: bold;
  border-bottom: 1px solid gold;
}

/* Scroll container */
.marquee-container {
  height: calc(100vh - 60px);
  overflow: hidden;
  position: relative;
}

/* Content */
.marquee-content {
  position: absolute;
  width: 100%;
}

/* Card */
.card-dev {
  background: rgba(255,215,0,0.06);
  border: 1px solid rgba(255,215,0,0.2);
  border-radius: 18px;
  padding: 15px;
  margin: 12px;
  box-shadow: 0 0 15px rgba(255,215,0,0.2);
}

.lines {
  font-size: 20px;
  line-height: 1.6;
}

.meaning {
  font-size: 14px;
  color: #ccc;
}

.chorus {
  color: gold;
  margin-top: 8px;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="header">🕉️ గోవింద నామాలు 🙏</div>

<div class="marquee-container" id="container">
  <div class="marquee-content" id="content"></div>
</div>

<script>
/* ===== FULL DATA (ADD ALL 54 PAIRS HERE) ===== */
const data = [
{pair:1,line1:"శ్రీ శ్రీనివాసా గోవిందా",line2:"శ్రీ వేంకటేశా గోవిందా",meaning:"తిరుమల నివాసి"},
{pair:2,line1:"భక్తవత్సల గోవిందా",line2:"భాగవతప్రియ గోవిందా",meaning:"భక్తులకు ప్రియుడు"},
{pair:3,line1:"నిత్యనిర్మల గోవిందా",line2:"నీలమేఘశ్యామ గోవిందా",meaning:"పవిత్ర స్వరూపం"},
{pair:4,line1:"పురాణపురుషా గోవిందా",line2:"పుండరీకాక్ష గోవిందా",meaning:"ఆది పురుషుడు"},
{pair:5,line1:"నందనందనా గోవిందా",line2:"నవనీతచోరా గోవిందా",meaning:"కృష్ణ లీలలు"}

/* 👉 CONTINUE TILL 54 */
];

/* ===== RENDER ===== */
const container = document.getElementById("content");

data.forEach(item => {
  const div = document.createElement("div");
  div.className = "card-dev";

  div.innerHTML = `
    <div>📿 ${item.pair}</div>
    <div class="lines">${item.line1}<br>${item.line2}</div>
    <div class="meaning">💡 ${item.meaning}</div>
    <div class="chorus">
      🔔 గోవింద హరి గోవిందా<br>
      🔔 గోకుల నందన గోవిందా
    </div>
  `;

  container.appendChild(div);
});

/* ===== MARQUEE SCROLL ===== */
let pos = 0;
let speed = 0.3;
let paused = false;

function scrollUp() {
  if (!paused) {
    pos -= speed;
    container.style.transform = `translateY(${pos}px)`;
  }
  requestAnimationFrame(scrollUp);
}

/* START AFTER 10 SECONDS */
setTimeout(() => {
  scrollUp();
}, 10000);

/* HOLD TO PAUSE */
document.addEventListener("touchstart", () => paused = true);
document.addEventListener("touchend", () => paused = false);

document.addEventListener("mousedown", () => paused = true);
document.addEventListener("mouseup", () => paused = false);

</script>

</body>
</html>
