<!DOCTYPE html>
<html lang="te">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Govinda Namalu</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
  margin: 0;
  background: radial-gradient(circle at center, #3b0000, #000);
  color: #fff;
  font-family: "Noto Sans Telugu", sans-serif;
  display: flex;
  flex-direction: column;
  height: 100vh;
  overflow: hidden;
}

/* Main Chant Area */
.chant-container {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
  padding: 20px;
}

.pair-number {
  color: #aaa;
  margin-bottom: 10px;
}

.line {
  font-size: 26px;
  line-height: 1.8;
}

.meaning {
  margin-top: 15px;
  font-size: 14px;
  color: #ccc;
}

/* Chorus */
.chorus {
  position: fixed;
  bottom: 80px;
  width: 100%;
  text-align: center;
  color: gold;
  font-size: 18px;
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0% { opacity: 0.6; }
  100% { opacity: 1; }
}

/* Controls */
.controls {
  position: fixed;
  bottom: 0;
  width: 100%;
  display: flex;
  justify-content: space-around;
  background: #000;
  padding: 10px;
  border-top: 1px solid gold;
}

.btn-dev {
  color: gold;
  font-size: 18px;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="chant-container" onclick="nextPair()">
  <div class="pair-number" id="number"></div>
  <div class="line" id="line1"></div>
  <div class="line" id="line2"></div>
  <div class="meaning" id="meaning"></div>
</div>

<div class="chorus">
  🔔 గోవింద హరి గోవిందా<br>
  🔔 గోకుల నందన గోవిందా
</div>

<div class="controls">
  <div class="btn-dev" onclick="prevPair()">⬅️</div>
  <div class="btn-dev" onclick="toggleAuto()">📿</div>
  <div class="btn-dev" onclick="nextPair()">➡️</div>
</div>

<script>
const data = [
{pair:1,line1:"శ్రీ శ్రీనివాసా గోవిందా",line2:"శ్రీ వేంకటేశా గోవిందా",meaning:"తిరుమలలో నివసించే దేవుడు"},
{pair:2,line1:"భక్తవత్సల గోవిందా",line2:"భాగవతప్రియ గోవిందా",meaning:"భక్తులను ప్రేమించే దేవుడు"},
{pair:3,line1:"నిత్యనిర్మల గోవిందా",line2:"నీలమేఘశ్యామ గోవిందా",meaning:"పవిత్రమైన స్వరూపం"},
{pair:4,line1:"పురాణపురుషా గోవిందా",line2:"పుండరీకాక్ష గోవిందా",meaning:"ఆది పురుషుడు"},
{pair:5,line1:"నందనందనా గోవిందా",line2:"నవనీతచోరా గోవిందా",meaning:"కృష్ణుడి బాలలీలలు"}
];

let index = 0;
let auto = false;

function render() {
  document.getElementById("number").innerText = "📿 Pair " + data[index].pair;
  document.getElementById("line1").innerText = data[index].line1;
  document.getElementById("line2").innerText = data[index].line2;
  document.getElementById("meaning").innerText = "💡 " + data[index].meaning;
}

function nextPair() {
  index = (index + 1) % data.length;
  render();
}

function prevPair() {
  index = (index - 1 + data.length) % data.length;
  render();
}

function toggleAuto() {
  auto = !auto;
  if (auto) autoPlay();
}

function autoPlay() {
  if (auto) {
    nextPair();
    setTimeout(autoPlay, 3000);
  }
}

render();
</script>

</body>
</html>
