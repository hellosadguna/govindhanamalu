<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pro Expense Tracker</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  background: linear-gradient(135deg,#141e30,#243b55);
  color: white;
  font-family: 'Segoe UI', sans-serif;
}

.card {
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(15px);
  border-radius: 20px;
  border: 1px solid rgba(255,255,255,0.1);
}

h1 {font-weight:700;}

.balance-box {
  font-size: 2.5rem;
  font-weight: bold;
}

.income {color:#00ffcc;}
.expense {color:#ff5c5c;}

.transaction {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px;
  border-radius:12px;
  margin-bottom:10px;
  background: rgba(255,255,255,0.05);
  transition:0.3s;
}

.transaction:hover {
  transform: scale(1.02);
}

.btn-custom {
  border-radius: 30px;
}

input, select {
  background: rgba(255,255,255,0.1) !important;
  color: white !important;
  border: none !important;
}

</style>
</head>
<body>

<div class="container py-4">

<h1 class="text-center mb-4">💎 Pro Expense Tracker</h1>

<div class="row g-4">

<div class="col-md-4">
<div class="card p-4 text-center">
<h5>Balance</h5>
<div id="balance" class="balance-box">₹0</div>
</div>

<div class="card p-4 mt-3">
<h6>Add Transaction</h6>
<input type="text" id="desc" class="form-control mb-2" placeholder="Description">
<input type="number" id="amount" class="form-control mb-2" placeholder="Amount">
<input type="date" id="date" class="form-control mb-2">
<select id="type" class="form-control mb-2">
<option value="income">Income</option>
<option value="expense">Expense</option>
</select>
<button class="btn btn-primary w-100 btn-custom" onclick="addTransaction()">Add</button>
</div>

<div class="card p-3 mt-3 text-center">
<button class="btn btn-danger btn-custom" onclick="clearAll()">Clear Data</button>
</div>

</div>

<div class="col-md-8">

<div class="card p-4 mb-4">
<h6>Analytics</h6>
<canvas id="chart"></canvas>
</div>

<div class="card p-4">
<div class="d-flex justify-content-between mb-3">
<h6>Transactions</h6>
<select id="filter" onchange="render()" class="form-select w-25">
<option value="all">All</option>
<option value="income">Income</option>
<option value="expense">Expense</option>
</select>
</div>
<div id="list"></div>
</div>

</div>

</div>

</div>

<script>
const KEY = 'pro_tracker';

function getData(){
 let d = JSON.parse(localStorage.getItem(KEY));
 if(!d) return {transactions:[], lastUpdated:null};

 let now = new Date();
 let last = new Date(d.lastUpdated);
 if((now-last)/(1000*60*60*24) > 365){
   localStorage.removeItem(KEY);
   return {transactions:[], lastUpdated:null};
 }
 return d;
}

function saveData(d){
 d.lastUpdated = new Date();
 localStorage.setItem(KEY, JSON.stringify(d));
}

function addTransaction(){
 let desc = document.getElementById('desc').value;
 let amount = parseFloat(document.getElementById('amount').value);
 let date = document.getElementById('date').value;
 let type = document.getElementById('type').value;

 if(!desc || !amount || !date) return alert('Fill all fields');

 let d = getData();
 d.transactions.push({id:Date.now(),desc,amount,date,type});
 saveData(d);
 render();

 desc.value=''; amount.value='';
}

function deleteItem(id){
 let d = getData();
 d.transactions = d.transactions.filter(x=>x.id!==id);
 saveData(d);
 render();
}

function clearAll(){
 if(confirm('Clear everything?')){
 localStorage.removeItem(KEY);
 render();
 }
}

let chart;

function renderChart(transactions){
 let income = 0, expense = 0;
 transactions.forEach(t=>{
  if(t.type==='income') income+=t.amount;
  else expense+=t.amount;
 });

 let ctx = document.getElementById('chart');
 if(chart) chart.destroy();

 chart = new Chart(ctx, {
 type:'doughnut',
 data:{
  labels:['Income','Expense'],
  datasets:[{data:[income,expense]}]
 }
 });
}

function render(){
 let d = getData();
 let list = document.getElementById('list');
 let filter = document.getElementById('filter').value;

 list.innerHTML='';

 let balance=0;

 let filtered = d.transactions.filter(t=> filter==='all' || t.type===filter);

 filtered.forEach(t=>{
  let div = document.createElement('div');
  div.className='transaction';

  if(t.type==='income') balance+=t.amount;
  else balance-=t.amount;

  div.innerHTML=`
   <div>
     <b>${t.desc}</b><br>
     <small>${t.date}</small>
   </div>
   <div class="${t.type}">
     ₹${t.amount}
     <button class="btn btn-sm btn-light ms-2" onclick="deleteItem(${t.id})">✕</button>
   </div>`;

  list.appendChild(div);
 });

 document.getElementById('balance').innerText='₹'+balance;
 renderChart(d.transactions);
}

render();
</script>

</body>
</html>
