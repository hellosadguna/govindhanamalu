<!DOCTYPE html>
<html lang="te">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Govinda Namalu</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
/* Background Temple Theme */
body {
  margin: 0;
  font-family: "Noto Sans Telugu", sans-serif;
  background: linear-gradient(to bottom, #2b0000, #000);
  color: #fff;
}

/* Header */
.header {
  text-align: center;
  padding: 15px;
  color: gold;
  font-size: 20px;
  font-weight: bold;
  border-bottom: 1px solid rgba(255,215,0,0.3);
}

/* Card */
.temple-card {
  background: rgba(255, 215, 0, 0.05);
  border: 1px solid rgba(255, 215, 0, 0.2);
  border-radius: 20px;
  padding: 16px;
  margin-bottom: 15px;
  box-shadow: 0 0 15px rgba(255,215,0,0.2);
  transition: all 0.3s ease;
}

.temple-card:hover {
  transform: translateY(-3px);
  box-shadow: 0 0 25px rgba(255,215,0,0.4);
}

/* Text */
.pair-no {
  font-size: 13px;
  color: #aaa;
}

.lines {
  font-size: 20px;
  line-height: 1.7;
  margin-top: 5px;
}

.meaning {
  font-size: 14px;
  color: #ddd;
  margin-top: 6px;
}

/* Chorus */
.chorus {
  margin-top: 10px;
  color: gold;
  font-weight: bold;
  font-size: 15px;
  border-top: 1px dashed rgba(255,215,0,0.3);
  padding-top: 8px;
}

/* Footer */
.footer {
  text-align: center;
  padding: 10px;
  color: #aaa;
}

/* Responsive */
@media (min-width: 768px) {
  .lines {
    font-size: 22px;
  }
}
</style>
</head>

<body>

<div class="header">
  🕉️ 108 గోవింద నామాలు 🙏
</div>

<div class="container mt-3" id="content"></div>

<div class="footer">
  🙏 గోవిందా గోవిందా 🙏
</div>

<script>
/* ================= DATA ================= */
const data = [
{pair:1,line1:"శ్రీ శ్రీనివాసా గోవిందా",line2:"శ్రీ వేంకటేశా గోవిందా",meaning:"లక్ష్మీతో తిరుమలలో నివసించే దేవుడు"},
{pair:2,line1:"భక్తవత్సల గోవిందా",line2:"భాగవతప్రియ గోవిందా",meaning:"భక్తులను ప్రేమించే దేవుడు"},
{pair:3,line1:"నిత్యనిర్మల గోవిందా",line2:"నీలమేఘశ్యామ గోవిందా",meaning:"పవిత్రమైన స్వరూపం"},
{pair:4,line1:"పురాణపురుషా గోవిందా",line2:"పుండరీకాక్ష గోవిందా",meaning:"ఆది పురుషుడు"},
{pair:5,line1:"నందనందనా గోవిందా",line2:"నవనీతచోరా గోవిందా",meaning:"కృష్ణుడి బాలలీలలు"}
];

/* ================= RENDER ================= */
const container = document.getElementById("content");

data.forEach(item => {
  const div = document.createElement("div");
  div.className = "temple-card";

  div.innerHTML = `
    <div class="pair-no">📿 Pair ${item.pair}</div>
    <div class="lines">
      ${item.line1}<br>${item.line2}
    </div>
    <div class="meaning">💡 ${item.meaning}</div>
    <div class="chorus">
      🔔 గోవింద హరి గోవిందా<br>
      🔔 గోకుల నందన గోవిందా
    </div>
  `;

  container.appendChild(div);
});

/* ================= SMOOTH SCROLL ================= */
let isPaused = false;
let scrollSpeed = 0.3; // 🔥 change speed here

function smoothScroll() {
  if (!isPaused) {
    window.scrollBy(0, scrollSpeed);
  }
  requestAnimationFrame(smoothScroll);
}

/* ================= HOLD TO PAUSE ================= */
function pause() { isPaused = true; }
function resume() { isPaused = false; }

document.addEventListener("touchstart", pause);
document.addEventListener("touchend", resume);

document.addEventListener("mousedown", pause);
document.addEventListener("mouseup", resume);

/* ================= OPTIONAL: PAUSE ON SCROLL TOUCH ================= */
document.addEventListener("wheel", pause);

/* ================= START ================= */
smoothScroll();
</script>

</body>
</html>
